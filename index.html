<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pràctica d'examen - Educació infantil</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Preparació d'examen</p>
          <h1>Pràctica tipus test</h1>
        </div>
        <button class="ghost-button" id="resetStatsBtn" type="button">Reinicia estadístiques</button>
      </header>

      <main id="app" class="app"></main>
    </div>

    <div class="modal-backdrop" id="confirmResetModal" hidden>
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmResetTitle">
        <p class="eyebrow">Confirmació</p>
        <h2 id="confirmResetTitle">Vols esborrar les estadístiques?</h2>
        <p>
          Aquesta acció eliminarà el millor resultat, l'última puntuació, el percentatge d'encerts i els
          temes més fallats desats en aquest navegador.
        </p>
        <div class="actions">
          <button class="secondary-button" id="cancelResetBtn" type="button">Cancel·la</button>
          <button class="danger-button" id="confirmResetBtn" type="button">Esborra estadístiques</button>
        </div>
      </section>
    </div>

    <template id="homeTemplate">
      <section class="grid two">
        <article class="panel start-panel">
          <div class="section-title">
            <p class="eyebrow">Modes disponibles</p>
            <h2>Comença a practicar</h2>
          </div>
          <div class="mode-list">
            <button class="mode-card" data-mode="first">
              <span>Primera prova - Tipus test</span>
              <small>40 preguntes, puntuació sobre 30 i llindar d'apte/a a 15 punts.</small>
            </button>
            <button class="mode-card" data-mode="case">
              <span>Segona prova - Cas pràctic</span>
              <small>Supòsit professional amb 15 preguntes i penalització també en blanc.</small>
            </button>
            <button class="mode-card" data-mode="study">
              <span>Mode estudi</span>
              <small>Preguntes per tema, resposta immediata i explicació breu.</small>
            </button>
          </div>
        </article>

        <aside class="panel stats-panel">
          <div class="section-title">
            <p class="eyebrow">Resum local</p>
            <h2>Estadístiques</h2>
          </div>
          <div class="stats-grid" id="statsGrid"></div>
          <div class="weak-list" id="weakTopics"></div>
        </aside>
      </section>
    </template>
    <script src="app.js"></script>
  </body>
</html>
